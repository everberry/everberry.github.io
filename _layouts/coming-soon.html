<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ page.title }} - Coming Soon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="{{ page.description }}" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <link rel="canonical" href="{{ page.url | absolute_url }}" />
  <link rel="icon" type="image/png" href="{{ '/images/everberryevents/logo/Original_on_transparent.png' | relative_url }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title }}" />
  <meta property="og:description" content="{{ page.description }}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:image" content="{{ page.logo | absolute_url }}" />
  <meta property="og:site_name" content="{{ page.title }}" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="{{ page.title }}" />
  <meta name="twitter:description" content="{{ page.description }}" />
  <meta name="twitter:image" content="{{ page.logo | absolute_url }}" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "{{ page.title }}",
    "url": "{{ page.url | absolute_url }}",
    "logo": "{{ page.logo | absolute_url }}",
    "description": "{{ page.description }}",
    "contactPoint": {
      "@type": "ContactPoint",
      "email": "{{ site.data.contact.email }}",
      "telephone": "{{ site.data.contact.phone }}",
      "contactType": "customer service"
    }
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', Helvetica, Arial, sans-serif;
      background-color: #f9fafb;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .coming-soon {
      max-width: 600px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .coming-soon__logo {
      width: 180px;
      height: auto;
      margin-bottom: 2rem;
    }
    .coming-soon__heading {
      font-size: 2rem;
      font-weight: 700;
      color: #4F46E5;
      margin-bottom: 0.5rem;
    }
    .coming-soon__tagline {
      font-size: 1.125rem;
      color: #6B7280;
      margin-bottom: 2.5rem;
    }
    .coming-soon__badge {
      display: inline-block;
      background-color: #4F46E5;
      color: #ffffff;
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 0.5rem 1.25rem;
      border-radius: 9999px;
      margin-bottom: 2.5rem;
    }
    .coming-soon__divider {
      width: 60px;
      height: 3px;
      background-color: #4F46E5;
      margin: 0 auto 2rem;
      border-radius: 2px;
    }
    .coming-soon__contact h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 1rem;
    }
    .coming-soon__contact p {
      font-size: 0.95rem;
      color: #4B5563;
      line-height: 1.8;
    }
    .coming-soon__contact a {
      color: #4F46E5;
      text-decoration: none;
    }
    .coming-soon__contact a:hover {
      text-decoration: underline;
    }
    .coming-soon__instagram {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
      padding: 0.5rem 1.25rem;
      background-color: #4F46E5;
      color: #ffffff;
      font-size: 0.875rem;
      font-weight: 600;
      border-radius: 9999px;
      text-decoration: none;
      transition: background-color 0.2s;
    }
    .coming-soon__instagram:hover {
      background-color: #4338ca;
      text-decoration: none;
      color: #ffffff;
    }
    .coming-soon__footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #9CA3AF;
    }
  </style>
</head>
<body>
  <main class="coming-soon" role="main">
    {% if page.logo %}
    <img class="coming-soon__logo" src="{{ page.logo | relative_url }}" alt="{{ page.title }} logo" />
    {% endif %}

    <span class="coming-soon__badge">Website Coming Soon</span>

    <div class="coming-soon__divider"></div>

    <div class="coming-soon__contact">
      <h2>Get in Touch</h2>
      <p>
        Email: <a href="mailto:{{ site.data.contact.email }}">{{ site.data.contact.email }}</a><br>
        Phone: <a href="tel:{{ site.data.contact.phone }}">{{ site.data.contact.phone }}</a>
      </p>
      <a class="coming-soon__instagram" href="https://instagram.com/ever_berry_events" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
        <span>@ever_berry_events</span>
      </a>
    </div>

    <p class="coming-soon__footer">&copy; {{ 'now' | date: "%Y" }} {{ page.title }}. All rights reserved.</p>
  </main>
  <script data-goatcounter="https://everberryevents.goatcounter.com/count" async src="https://gc.zgo.at/count.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</body>
</html>
